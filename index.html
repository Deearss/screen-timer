<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>screentimer — jaga mata lo</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/184f34cb79.js"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        --bg: #1c1b16;
        --surface: #242318;
        --border: #2e2d22;
        --subtle: #3a3929;
        --accent: #d97757;
        --accent-dim: rgba(217, 119, 87, 0.12);
        --accent-mid: rgba(217, 119, 87, 0.35);
        --rest: #74b9ff;
        --rest-dim: rgba(116, 185, 255, 0.12);
        --warn: #f0a04b;
        --warn-dim: rgba(240, 160, 75, 0.12);
        --danger: #e05c5c;
        --text: #e8e4d8;
        --muted: #6b6756;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem 1rem;
      }

      .container {
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* Header */
      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding-bottom: 0.85rem;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .logo i { font-size: 1rem; opacity: 0.85; }
      .logo span {
        color: var(--muted);
        font-weight: 400;
      }

      .sesi-info {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
      }
      .sesi-label {
        font-size: 0.72rem;
        color: var(--muted);
        letter-spacing: 0.03em;
      }
      .sesi-label b {
        color: var(--accent);
      }

      .sesi-dots {
        display: flex;
        gap: 4px;
      }
      .dot-s {
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--subtle);
        transition: background 0.3s;
      }
      .dot-s.done {
        background: var(--accent);
      }

      /* Top row */
      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.3rem 0.75rem;
        border-radius: 3px;
        border: 1px solid;
        transition: all 0.3s;
      }
      .badge.kerja {
        color: var(--accent);
        border-color: var(--accent-mid);
        background: var(--accent-dim);
      }
      .badge.mikro {
        color: var(--rest);
        border-color: rgba(116, 185, 255, 0.35);
        background: var(--rest-dim);
      }
      .badge.istirahat {
        color: var(--warn);
        border-color: rgba(240, 160, 75, 0.35);
        background: var(--warn-dim);
      }
      .badge i {
        font-size: 0.65rem;
        animation: blink 1.6s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }

      .interval-wrap {
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .interval-wrap label {
        font-size: 0.72rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .interval-wrap label i { font-size: 0.65rem; }
      .interval-wrap select {
        font-family: "Inter", sans-serif;
        font-size: 0.76rem;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.3rem 0.5rem;
        border-radius: 3px;
        cursor: pointer;
        outline: none;
        transition: border-color 0.2s;
      }
      .interval-wrap select:focus {
        border-color: var(--accent);
      }

      /* Timer card */
      .timer-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 1.6rem 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
      }
      .timer-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        transition: background 0.4s;
      }
      .timer-card.mikro::after {
        background: var(--rest);
      }
      .timer-card.istirahat::after {
        background: var(--warn);
      }

      /* Ring */
      .ring-wrap {
        position: relative;
        width: 150px;
        height: 150px;
      }
      .ring-wrap svg {
        transform: rotate(-90deg);
      }
      .ring-bg {
        stroke: var(--subtle);
      }
      .ring-fill {
        stroke: var(--accent);
        stroke-linecap: round;
        transition:
          stroke-dashoffset 0.25s linear,
          stroke 0.4s;
      }
      .ring-fill.mikro {
        stroke: var(--rest);
      }
      .ring-fill.istirahat {
        stroke: var(--warn);
      }
      .ring-fill.urgent {
        stroke: var(--danger);
      }

      .ring-center {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 28px;
      }
      .ring-time {
        font-size: 1.98rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--accent);
        line-height: 1;
        text-align: center;
        transition: color 0.3s;
        width: 100%;
        word-break: break-all;
      }
      .ring-time.mikro {
        color: var(--rest);
      }
      .ring-time.istirahat {
        color: var(--warn);
      }
      .ring-time.urgent {
        color: var(--danger);
        animation: urgBlink 0.7s ease-in-out infinite;
      }
      @keyframes urgBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.5; }
      }

      .ring-sub {
        font-size: 0.62rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* Instruksi */
      .instruksi {
        width: 100%;
        border-radius: 4px;
        border: 1px solid;
        padding: 0.85rem 1rem;
        font-size: 0.82rem;
        line-height: 1.75;
        display: none;
        margin-top: 1rem;
      }
      .instruksi.mikro {
        display: block;
        color: var(--rest);
        border-color: rgba(116, 185, 255, 0.3);
        background: var(--rest-dim);
      }
      .instruksi.istirahat {
        display: block;
        color: var(--warn);
        border-color: rgba(240, 160, 75, 0.3);
        background: var(--warn-dim);
      }
      .instruksi .ins-judul {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.65;
        margin-bottom: 7px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ins-line {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 1px 0;
      }
      .ins-line i {
        flex-shrink: 0;
        font-size: 0.78rem;
        opacity: 0.8;
        width: 14px;
        text-align: center;
      }

      /* Kontrol */
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
      }
      .btn {
        font-family: "Inter", sans-serif;
        font-size: 0.84rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        padding: 0.76rem 1rem;
        border-radius: 4px;
        border: 1px solid;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }
      .btn i { font-size: 0.78rem; }
      .btn-utama {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .btn-utama:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }
      .btn-sekunder {
        background: transparent;
        border-color: var(--border);
        color: var(--muted);
      }
      .btn-sekunder:hover {
        border-color: var(--muted);
        color: var(--text);
      }

      /* Statistik */
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.6rem;
      }
      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.75rem 0.5rem;
        text-align: center;
      }
      .stat-val {
        font-size: 1.56rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .stat-lbl {
        font-size: 0.64rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .stat-lbl i { font-size: 0.6rem; opacity: 0.7; }

      /* Footer */
      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
        padding-top: 0.7rem;
        font-size: 0.68rem;
        color: var(--muted);
      }
      footer .src {
        text-align: right;
        opacity: 0.55;
        font-size: 0.65rem;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      footer .src i { font-size: 0.6rem; }

      /* Toast */
      .toast {
        position: fixed;
        top: 1.2rem;
        right: 1.2rem;
        background: var(--surface);
        border: 1px solid var(--accent-mid);
        border-radius: 5px;
        padding: 0.85rem 1rem;
        font-size: 0.8rem;
        color: var(--accent);
        max-width: 240px;
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease,
          visibility 0.25s;
        line-height: 1.5;
      }
      .toast.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }
      .toast.warn-t {
        border-color: rgba(240, 160, 75, 0.4);
        color: var(--warn);
      }
      .toast .t-judul {
        font-weight: 700;
        margin-bottom: 2px;
      }

      /* Mobile — font sizes ×1.1 of original (desktop is ×1.2) */
      @media (max-width: 640px) {
        .logo             { font-size: 1.1rem; }
        .sesi-label       { font-size: 0.66rem; }
        .badge            { font-size: 0.66rem; }
        .interval-wrap label { font-size: 0.66rem; }
        .interval-wrap select { font-size: 0.69rem; }
        .ring-time        { font-size: 1.82rem; }
        .ring-sub         { font-size: 0.57rem; }
        .instruksi        { font-size: 0.75rem; }
        .instruksi .ins-judul { font-size: 0.63rem; }
        .btn              { font-size: 0.77rem; }
        .stat-val         { font-size: 1.43rem; }
        .stat-lbl         { font-size: 0.58rem; }
        footer            { font-size: 0.63rem; }
        footer .src       { font-size: 0.59rem; }
        .toast            { font-size: 0.74rem; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="logo">
          <i class="fa-solid fa-eye"></i>screen<span>timer</span>
        </div>
        <div class="sesi-info">
          <div class="sesi-label">
            sesi <b id="sesiNum">1</b> / 4 &rarr; istirahat panjang
          </div>
          <div class="sesi-dots" id="sesiDots"></div>
        </div>
      </div>

      <!-- Badge + Interval -->
      <div class="top-row">
        <div class="badge kerja" id="badge">
          <i id="badgeIcon" class="fa-solid fa-laptop-code"></i>
          <span id="badgeTeks">Kerja</span>
        </div>
        <div class="interval-wrap">
          <label><i class="fa-solid fa-sliders"></i> interval kerja</label>
          <select id="selectInterval" onchange="gantiInterval()">
            <option value="20">20 menit</option>
            <option value="25">25 menit</option>
            <option value="30" selected>30 menit</option>
            <option value="45">45 menit</option>
            <option value="60">60 menit</option>
            <option value="120">120 menit</option>
          </select>
        </div>
      </div>

      <!-- Timer Card -->
      <div class="timer-card" id="timerCard">
        <div class="ring-wrap">
          <svg width="150" height="150" viewBox="0 0 150 150">
            <circle class="ring-bg" cx="75" cy="75" r="64" fill="none" stroke-width="5" />
            <circle
              class="ring-fill"
              id="ringFill"
              cx="75" cy="75" r="64"
              fill="none" stroke-width="5"
              stroke-dasharray="402.12" stroke-dashoffset="0"
            />
          </svg>
          <div class="ring-center">
            <div class="ring-time" id="ringTime">30:00</div>
            <div class="ring-sub" id="ringSub">tersisa</div>
          </div>
        </div>

        <div class="instruksi" id="instruksiBox">
          <div class="ins-judul" id="instruksiJudul"></div>
          <div id="instruksiIsi"></div>
        </div>
      </div>

      <!-- Kontrol -->
      <div class="controls">
        <button class="btn btn-utama" id="btnMulai" onclick="toggleTimer()">
          <i class="fa-solid fa-play"></i> Mulai
        </button>
        <button class="btn btn-sekunder" onclick="resetTimer()">
          <i class="fa-solid fa-rotate-left"></i> Reset
        </button>
      </div>

      <!-- Statistik -->
      <div class="stats">
        <div class="stat">
          <div class="stat-val" id="statFokus">0m</div>
          <div class="stat-lbl"><i class="fa-solid fa-hourglass-half"></i> Fokus</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statBreak">0</div>
          <div class="stat-lbl"><i class="fa-solid fa-mug-hot"></i> Istirahat</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="statSesi">0</div>
          <div class="stat-lbl"><i class="fa-solid fa-layer-group"></i> Sesi</div>
        </div>
      </div>

      <!-- Footer -->
      <footer>
        <div>&copy; <span id="tahun"></span> screentimer</div>
        <div class="src">
          <i class="fa-solid fa-circle-info"></i> Sumber: AOA &amp; ScienceDirect
        </div>
      </footer>
    </div>

    <!-- Toast notif -->
    <div class="toast" id="toast">
      <div class="t-judul" id="toastJudul"></div>
      <div id="toastIsi"></div>
    </div>

    <script>
      document.getElementById("tahun").textContent = new Date().getFullYear();

      const CIRC = 2 * Math.PI * 64;
      const LS_KEY = "screentimer_state";

      const MODE = {
        kerja: {
          label: "Kerja",
          badge: "kerja",
          card: "",
          ring: "",
          icon: "fa-solid fa-laptop-code",
          instruksi: null,
        },
        mikro: {
          label: "Istirahat Mikro",
          badge: "mikro",
          card: "mikro",
          ring: "mikro",
          icon: "fa-solid fa-eye",
          instruksi: {
            cls: "mikro",
            judul: '<i class="fa-solid fa-eye"></i> Istirahat mikro &mdash; 20 detik',
            isi: [
              { icon: "fa-solid fa-eye",       teks: "Lihat sesuatu yang jauh (6m+)" },
              { icon: "fa-solid fa-door-open", teks: "Boleh keluar sebentar" },
              { icon: "fa-solid fa-ban",       teks: "Jangan buka HP atau layar lain" },
            ],
          },
        },
        istirahat: {
          label: "Istirahat Panjang",
          badge: "istirahat",
          card: "istirahat",
          ring: "istirahat",
          icon: "fa-solid fa-mug-hot",
          instruksi: {
            cls: "istirahat",
            judul: '<i class="fa-solid fa-mug-hot"></i> Istirahat panjang &mdash; 15 menit',
            isi: [
              { icon: "fa-solid fa-person-walking", teks: "Jalan kaki di luar, lihat jauh" },
              { icon: "fa-solid fa-brain",           teks: "Boleh mikir coding, jangan lihat layar" },
              { icon: "fa-solid fa-droplet",         teks: "Minum air, stretch punggung dan leher" },
            ],
          },
        },
      };

      const defaultState = {
        mode: "kerja",
        sisa: 30 * 60,
        total: 30 * 60,
        menitKerja: 30,
        sesiBlok: 0,
        totalSesi: 0,
        totalBreak: 0,
      };

      function loadState() {
        try {
          const raw = localStorage.getItem(LS_KEY);
          if (!raw) return { ...defaultState };
          const saved = JSON.parse(raw);
          if (!saved.mode || !MODE[saved.mode]) return { ...defaultState };
          return { ...defaultState, ...saved };
        } catch {
          return { ...defaultState };
        }
      }

      function saveState() {
        try {
          localStorage.setItem(
            LS_KEY,
            JSON.stringify({
              mode: S.mode,
              sisa: S.sisa,
              total: S.total,
              menitKerja: S.menitKerja,
              sesiBlok: S.sesiBlok,
              totalSesi: S.totalSesi,
              totalBreak: S.totalBreak,
            }),
          );
        } catch {}
      }

      const S = { ...loadState(), running: false, tick: null };

      function fmt(sec) {
        return (
          String(Math.floor(sec / 60)).padStart(2, "0") +
          ":" +
          String(sec % 60).padStart(2, "0")
        );
      }

      function updateRing(sisa, total) {
        document.getElementById("ringFill").style.strokeDashoffset =
          CIRC * (1 - sisa / total);
      }

      function renderInstruksi(m) {
        const box = document.getElementById("instruksiBox");
        if (m.instruksi) {
          box.className = "instruksi " + m.instruksi.cls;
          document.getElementById("instruksiJudul").innerHTML = m.instruksi.judul;
          document.getElementById("instruksiIsi").innerHTML = m.instruksi.isi
            .map(item => `<div class="ins-line"><i class="${item.icon}"></i><span>${item.teks}</span></div>`)
            .join("");
        } else {
          box.className = "instruksi";
        }
      }

      function renderState() {
        const m = MODE[S.mode];

        document.getElementById("timerCard").className = "timer-card " + m.card;

        const rf = document.getElementById("ringFill");
        rf.className = "ring-fill " + m.ring;
        updateRing(S.sisa, S.total);

        const rt = document.getElementById("ringTime");
        rt.className = "ring-time " + m.ring;
        rt.textContent = fmt(S.sisa);
        document.getElementById("ringSub").textContent = "tersisa";

        renderInstruksi(m);

        document.getElementById("selectInterval").value = String(S.menitKerja);

        document.getElementById("statFokus").textContent = S.menitKerja * S.totalSesi + "m";
        document.getElementById("statBreak").textContent = S.totalBreak;
        document.getElementById("statSesi").textContent = S.totalSesi;

        updateSesiDots();
        document.getElementById("btnMulai").innerHTML = '<i class="fa-solid fa-play"></i> Mulai';
        updateBadge();
        setSelectDisabled(false);
      }

      function setMode(mode, dur) {
        S.mode = mode;
        S.total = dur;
        S.sisa = dur;
        S.running = false;
        renderState();
        saveState();
      }

      function gantiInterval() {
        const v = parseInt(document.getElementById("selectInterval").value);
        S.menitKerja = v;
        if (S.mode === "kerja" && !S.running) {
          setMode("kerja", v * 60);
        }
        saveState();
      }

      function toggleTimer() {
        S.running ? jeda() : mulai();
      }

      function setSelectDisabled(val) {
        document.getElementById("selectInterval").disabled = val;
      }

      function updateBadge() {
        const m = MODE[S.mode];
        const b = document.getElementById("badge");
        const icon = document.getElementById("badgeIcon");
        if (S.mode === "kerja" && !S.running) {
          b.className = "badge istirahat";
          document.getElementById("badgeTeks").textContent = "Istirahat";
          icon.className = "fa-solid fa-clock";
        } else {
          b.className = "badge " + m.badge;
          document.getElementById("badgeTeks").textContent = m.label;
          icon.className = m.icon;
        }
      }

      function mulai() {
        S.running = true;
        setSelectDisabled(true);
        document.getElementById("btnMulai").innerHTML = '<i class="fa-solid fa-pause"></i> Jeda';
        updateBadge();

        const startTime = Date.now();
        const startSisa = S.sisa;
        let lastSisa = startSisa + 1; // pastikan tick pertama selalu diproses

        function tick() {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          S.sisa = Math.max(0, startSisa - elapsed);

          if (S.sisa === lastSisa && S.sisa > 0) return; // belum berubah
          lastSisa = S.sisa;

          updateRing(S.sisa, S.total);

          const rt = document.getElementById("ringTime");
          rt.textContent = fmt(S.sisa);

          if (S.mode === "kerja") {
            const mFokus = S.menitKerja * S.totalSesi + Math.floor((S.total - S.sisa) / 60);
            document.getElementById("statFokus").textContent = mFokus + "m";
          }

          if (S.sisa <= 10 && S.sisa > 0) {
            rt.className = "ring-time urgent";
            document.getElementById("ringFill").className = "ring-fill urgent";
          }

          if (S.sisa % 10 === 0) saveState();

          if (S.sisa <= 0) {
            clearInterval(S.tick);
            S.running = false;
            saveState();
            selesai();
          }
        }

        tick(); // langsung update tanpa menunggu interval pertama
        S.tick = setInterval(tick, 250); // cek 4x/detik untuk presisi
      }

      function jeda() {
        clearInterval(S.tick);
        S.running = false;
        setSelectDisabled(false);
        document.getElementById("btnMulai").innerHTML = '<i class="fa-solid fa-play"></i> Lanjut';
        updateBadge();
        saveState();
      }

      function selesai() {
        if (S.mode === "kerja") {
          S.sesiBlok++;
          S.totalSesi++;
          S.totalBreak++;
          document.getElementById("statSesi").textContent = S.totalSesi;
          document.getElementById("statBreak").textContent = S.totalBreak;
          document.getElementById("statFokus").textContent = S.menitKerja * S.totalSesi + "m";
          updateSesiDots();

          if (S.sesiBlok >= 4) {
            S.sesiBlok = 0;
            updateSesiDots();
            showToast("Istirahat 15 menit!", "Udah 2 jam coding. Gas keluar, lihat jauh.", "warn-t");
            setMode("istirahat", 15 * 60);
            autoMulai();
          } else {
            showToast("Istirahat mikro!", "20 detik — lihat sesuatu jauh. Jangan buka HP.", "");
            setMode("mikro", 20);
            autoMulai();
          }
        } else if (S.mode === "mikro") {
          showToast("Lanjut coding!", "Mata lo udah diistirahin. Gas balik kerja.", "");
          setMode("kerja", S.menitKerja * 60);
        } else if (S.mode === "istirahat") {
          showToast("Siap lagi!", "15 menit habis. Mata lo harusnya udah recovery.", "");
          setMode("kerja", S.menitKerja * 60);
        }
        saveState();
      }

      function autoMulai() {
        document.getElementById("btnMulai").innerHTML = '<i class="fa-solid fa-pause"></i> Jeda';
        mulai(); // langsung, tanpa delay
      }

      function resetTimer() {
        clearInterval(S.tick);
        Object.assign(S, { ...defaultState, running: false, tick: null });
        renderState();
        saveState();
      }

      function updateSesiDots() {
        const c = document.getElementById("sesiDots");
        c.innerHTML = "";
        for (let i = 0; i < 4; i++) {
          const d = document.createElement("div");
          d.className = "dot-s" + (i < S.sesiBlok ? " done" : "");
          c.appendChild(d);
        }
        document.getElementById("sesiNum").textContent = Math.min(S.sesiBlok + 1, 4);
      }

      let toastTmr;
      function showToast(judul, isi, cls) {
        const el = document.getElementById("toast");
        document.getElementById("toastJudul").textContent = judul;
        document.getElementById("toastIsi").textContent = isi;
        el.className = `toast ${cls} show`;
        if (Notification.permission === "granted")
          new Notification(judul, { body: isi });
        clearTimeout(toastTmr);
        toastTmr = setTimeout(() => {
          el.className = `toast ${cls}`;
        }, 5000);
      }

      if (Notification.permission === "default")
        Notification.requestPermission();

      renderState();
    </script>
  </body>
</html>
